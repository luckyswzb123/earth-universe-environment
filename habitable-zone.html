<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜居带演示器 - 地球的宇宙环境</title>
    
    <!-- CSS文件 -->
    <link rel="stylesheet" href="css/habitable-zone.css">
    
    <!-- 响应式viewport设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 移动端优化 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 头部导航 -->
    <header>
        <a href="index.html" class="back-button">← 返回主页</a>
        <h1>宜居带演示器</h1>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 宜居带区域 -->
        <div class="habitable-zone-section">
            <div class="habitable-zone" id="habitableZone">
                <!-- 区域标签 -->
                <div class="zone-labels">
                    <div class="zone-label hot">太热</div>
                    <div class="zone-label habitable">宜居</div>
                    <div class="zone-label cold">太冷</div>
                </div>
                
                <!-- 太阳 -->
                <div class="sun"></div>
                
                <!-- 地球 -->
                <div class="earth" id="earth"></div>
                
                <!-- 温度计 -->
                <div class="thermometer">
                    <div class="thermometer-label">温度</div>
                    <div class="thermometer-fill" id="thermometerFill"></div>
                </div>
            </div>
            
            <!-- 操作说明 -->
            <div class="instructions">
                🌍 拖拽地球到不同位置，观察温度变化和生命适宜性
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <h2 class="info-title">环境数据</h2>
            
            <div class="info-item">
                <div class="info-label">当前区域</div>
                <div class="info-value" id="currentZone">宜居</div>
                <div class="info-description" id="zoneDescription">适合生命存在的理想区域</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">温度</div>
                <div class="info-value" id="currentTemp">15℃</div>
                <div class="info-description">当前模拟温度</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">水状态</div>
                <div class="info-value" id="waterState">液态</div>
                <div class="info-description" id="waterDescription">水以液态形式存在</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">生命结论</div>
                <div class="info-value" id="conclusion">适合生命</div>
                <div class="info-description" id="conclusionDescription">地球位于宜居带内</div>
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="resetEarth()">重置位置</button>
                <button class="control-btn" onclick="showHelp()">使用帮助</button>
            </div>
        </div>
    </div>

    <!-- JavaScript文件 -->
    <script src="js/habitable-zone.js"></script>
</body>
</html>
