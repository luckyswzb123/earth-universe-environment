<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地球的宇宙环境 - 交互式课件</title>
    
    <!-- CSS文件 -->
    <link rel="stylesheet" href="css/main.css">
    
    <!-- 响应式viewport设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 移动端优化 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>地球的宇宙环境</h1>
            <p class="subtitle">七年级上册地理 · 交互式学习课件</p>
        </header>

        <main>
            <div class="modules-grid">
                <!-- 太阳系模型 -->
                <div class="module-card">
                    <span class="module-icon">🌌</span>
                    <h2 class="module-title">太阳系模型</h2>
                    <p class="module-description">
                        探索太阳系八大行星的运行轨迹，观察3D立体行星围绕太阳旋转的壮观景象
                    </p>
                    <button class="module-button" onclick="openModule('solar-system.html')">
                        开始探索
                    </button>
                </div>

                <!-- 宜居带演示器 -->
                <div class="module-card">
                    <span class="module-icon">🌍</span>
                    <h2 class="module-title">宜居带演示器</h2>
                    <p class="module-description">
                        基于真实天文数据的科学演示，拖拽地球体验温度变化，理解宜居带原理
                    </p>
                    <button class="module-button" onclick="openModule('habitable-zone-v2.html')" style="background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%); border-color: #4caf50; color: white;">
                        科学探索
                    </button>
                </div>

                <!-- 中国航天时间轴 -->
                <div class="module-card">
                    <span class="module-icon">🚀</span>
                    <h2 class="module-title">中国航天时间轴</h2>
                    <p class="module-description">
                        回顾中国航天事业的辉煌历程，见证从东方红到天宫的伟大成就
                    </p>
                    <button class="module-button" onclick="openModule('timeline-v2.html')" style="background: linear-gradient(135deg, #ff6b35 0%, #ff9800 100%); border-color: #ff6b35; color: white;">
                        回顾历程
                    </button>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 地理交互式课件 | 为七年级学生量身打造</p>
        </footer>
    </div>

    <script>
        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = window.innerWidth <= 768 ? 100 : 150;
            
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 3 + 's';
                
                starsContainer.appendChild(star);
            }
        }

        // 打开模块页面
        function openModule(page) {
            window.open(page, '_blank');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            // 添加页面加载动画
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '1';
            }, 100);
        });

        // 添加键盘导航
        document.addEventListener('keydown', function(e) {
            const buttons = document.querySelectorAll('.module-button');
            
            // 数字键1-3快速导航
            if (e.key >= '1' && e.key <= '3') {
                const indexKey = parseInt(e.key) - 1;
                if (buttons[indexKey]) {
                    buttons[indexKey].click();
                }
            }
        });
    </script>
</body>
</html>
