<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜居带演示器 - 地球的宇宙环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* 头部导航 */
        header {
            position: relative;
            z-index: 100;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #e6b800 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .back-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: translateY(-50%) scale(1.05);
        }

        /* 主容器 */
        .main-container {
            display: flex;
            height: calc(100vh - 100px);
            position: relative;
            z-index: 10;
        }

        /* 宜居带区域 */
        .habitable-zone-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .habitable-zone {
            width: 600px;
            height: 400px;
            background: linear-gradient(90deg, 
                #ff1744 0%, 
                #ff1744 20%, 
                #ff6b6b 20%,
                #ff6b6b 25%,
                #00c853 25%,
                #00c853 75%,
                #ff6b6b 75%,
                #ff6b6b 80%,
                #2979ff 80%,
                #2979ff 100%);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* 区域标签 */
        .zone-labels {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .zone-label {
            position: absolute;
            top: 20px;
            font-size: 18px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .zone-label.hot {
            left: 50px;
            color: #ff1744;
            text-shadow: 0 0 10px #ff1744;
        }

        .zone-label.habitable {
            left: 50%;
            transform: translateX(-50%);
            color: #00c853;
            text-shadow: 0 0 10px #00c853;
        }

        .zone-label.cold {
            right: 50px;
            color: #2979ff;
            text-shadow: 0 0 10px #2979ff;
        }

        /* 太阳 */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at 30% 30%, #fff8e1 0%, #ffeb3b 30%, #ff9800 60%, #ff5722 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 60px #ff9800,
                0 0 100px #ff5722,
                0 0 150px #ff5722,
                inset 0 0 20px #ff5722;
            animation: sunPulse 3s ease-in-out infinite;
            z-index: 10;
        }

        @keyframes sunPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 60px #ff9800,
                    0 0 100px #ff5722,
                    0 0 150px #ff5722,
                    inset 0 0 20px #ff5722;
            }
            50% { 
                box-shadow: 
                    0 0 80px #ff9800,
                    0 0 120px #ff5722,
                    0 0 180px #ff5722,
                    inset 0 0 30px #ff5722;
            }
        }

        /* 地球 */
        .earth {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle at 30% 30%, #64b5f6 0%, #2196f3 50%, #1565c0 100%);
            border-radius: 50%;
            top: 50%;
            left: 75%;
            transform: translate(-50%, -50%);
            cursor: move;
            box-shadow: 
                0 0 20px #2196f3,
                0 0 40px #2196f3,
                inset -5px -5px 10px rgba(0, 0, 0, 0.3);
            z-index: 20;
            transition: box-shadow 0.3s ease;
        }

        .earth:hover {
            box-shadow: 
                0 0 30px #2196f3,
                0 0 60px #2196f3,
                inset -5px -5px 10px rgba(0, 0, 0, 0.3);
        }

        .earth.dragging {
            box-shadow: 
                0 0 40px #2196f3,
                0 0 80px #2196f3,
                inset -5px -5px 10px rgba(0, 0, 0, 0.3);
        }

        /* 地球大气层效果 */
        .earth::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, rgba(135, 206, 235, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 信息面板 */
        .info-panel {
            width: 400px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-left: 2px solid rgba(230, 184, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-title {
            font-size: 24px;
            color: #e6b800;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-5px);
        }

        .info-label {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .info-value.zone-hot {
            color: #ff1744;
            text-shadow: 0 0 10px #ff1744;
        }

        .info-value.zone-habitable {
            color: #00c853;
            text-shadow: 0 0 10px #00c853;
        }

        .info-value.zone-cold {
            color: #2979ff;
            text-shadow: 0 0 10px #2979ff;
        }

        .info-description {
            font-size: 14px;
            color: #d0d0d0;
            line-height: 1.5;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .control-btn {
            flex: 1;
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
        }

        .control-btn:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: translateY(-2px);
        }

        /* 温度计 */
        .thermometer {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .thermometer-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to top, #2979ff 0%, #00c853 50%, #ff1744 100%);
            border-radius: 0 0 13px 13px;
            transition: height 0.5s ease;
        }

        .thermometer-label {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #e6b800;
            white-space: nowrap;
        }

        /* 说明文字 */
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #b0b0b0;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }
            
            .habitable-zone {
                width: 90vw;
                max-width: 500px;
                height: 300px;
            }
            
            .info-panel {
                width: 100%;
                border-left: none;
                border-top: 2px solid rgba(230, 184, 0, 0.3);
                padding: 20px;
            }
            
            .thermometer {
                display: none;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .info-value {
                font-size: 24px;
            }
            
            .info-panel {
                gap: 15px;
            }
            
            .info-item {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 头部导航 -->
    <header>
        <a href="index.html" class="back-button">← 返回主页</a>
        <h1>宜居带演示器</h1>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 宜居带区域 -->
        <div class="habitable-zone-section">
            <div class="habitable-zone" id="habitableZone">
                <!-- 区域标签 -->
                <div class="zone-labels">
                    <div class="zone-label hot">太热</div>
                    <div class="zone-label habitable">宜居</div>
                    <div class="zone-label cold">太冷</div>
                </div>
                
                <!-- 太阳 -->
                <div class="sun"></div>
                
                <!-- 地球 -->
                <div class="earth" id="earth"></div>
                
                <!-- 温度计 -->
                <div class="thermometer">
                    <div class="thermometer-label">温度</div>
                    <div class="thermometer-fill" id="thermometerFill"></div>
                </div>
            </div>
            
            <!-- 操作说明 -->
            <div class="instructions">
                🌍 拖拽地球到不同位置，观察温度变化和生命适宜性
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <h2 class="info-title">环境数据</h2>
            
            <div class="info-item">
                <div class="info-label">当前区域</div>
                <div class="info-value" id="currentZone">宜居</div>
                <div class="info-description" id="zoneDescription">适合生命存在的理想区域</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">温度</div>
                <div class="info-value" id="currentTemp">15℃</div>
                <div class="info-description">当前模拟温度</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">水状态</div>
                <div class="info-value" id="waterState">液态</div>
                <div class="info-description" id="waterDescription">水以液态形式存在</div>
            </div>
            
            <div class="info-item">
                <div class="info-label">生命结论</div>
                <div class="info-value" id="conclusion">适合生命</div>
                <div class="info-description" id="conclusionDescription">地球位于宜居带内</div>
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="resetEarth()">重置位置</button>
                <button class="control-btn" onclick="showHelp()">使用帮助</button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let isDragging = false;
        let currentX;
        let currentY;
        let initialX;
        let initialY;
        let xOffset = 0;
        let yOffset = 0;

        const earth = document.getElementById('earth');
        const habitableZone = document.getElementById('habitableZone');

        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 150;
            
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 4 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                starsContainer.appendChild(star);
            }
        }

        // 拖拽功能
        earth.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);

        // 触摸事件支持
        earth.addEventListener('touchstart', dragStart);
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (e.type === 'touchstart') {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }

            if (e.target === earth) {
                isDragging = true;
                earth.classList.add('dragging');
            }
        }

        function drag(e) {
            if (isDragging) {
                e.preventDefault();
                
                if (e.type === 'touchmove') {
                    currentX = e.touches[0].clientX - initialX;
                    currentY = e.touches[0].clientY - initialY;
                } else {
                    currentX = e.clientX - initialX;
                    currentY = e.clientY - initialY;
                }

                xOffset = currentX;
                yOffset = currentY;

                // 限制在宜居带区域内
                const rect = habitableZone.getBoundingClientRect();
                const earthRect = earth.getBoundingClientRect();
                
                let newX = currentX;
                let newY = currentY;
                
                // X轴限制
                if (earthRect.left < rect.left + 20) {
                    newX = rect.left + 20 - earth.offsetLeft;
                } else if (earthRect.right > rect.right - 20) {
                    newX = rect.right - 20 - earth.offsetLeft - earth.offsetWidth;
                }
                
                // Y轴限制
                if (earthRect.top < rect.top + 20) {
                    newY = rect.top + 20 - earth.offsetTop;
                } else if (earthRect.bottom > rect.bottom - 20) {
                    newY = rect.bottom - 20 - earth.offsetTop - earth.offsetHeight;
                }

                earth.style.transform = `translate(calc(-50% + ${newX}px), calc(-50% + ${newY}px))`;
                
                updateZoneInfo();
            }
        }

        function dragEnd(e) {
            initialX = currentX;
            initialY = currentY;
            isDragging = false;
            earth.classList.remove('dragging');
        }

        // 更新区域信息
        function updateZoneInfo() {
            const rect = habitableZone.getBoundingClientRect();
            const earthRect = earth.getBoundingClientRect();
            
            // 计算地球中心位置
            const earthCenterX = earthRect.left + earthRect.width / 2;
            const earthCenterY = earthRect.top + earthRect.height / 2;
            
            // 计算与太阳的距离
            const sunCenterX = rect.left + rect.width / 2;
            const sunCenterY = rect.top + rect.height / 2;
            
            const distance = Math.sqrt(
                Math.pow(earthCenterX - sunCenterX, 2) + 
                Math.pow(earthCenterY - sunCenterY, 2)
            );
            
            // 计算相对位置 (0-1)
            const relativeDistance = distance / (rect.width / 2);
            
            // 计算温度 (简化公式)
            const temp = Math.round(100 - relativeDistance * 300);
            
            // 确定区域
            let zone, zoneClass, waterState, conclusion, zoneDesc, waterDesc, conclusionDesc;
            
            if (relativeDistance < 0.25) {
                zone = '太热';
                zoneClass = 'zone-hot';
                waterState = '气态';
                conclusion = '不适合';
                zoneDesc = '距离太阳太近，温度过高';
                waterDesc = '水以气态形式存在，无法形成液态海洋';
                conclusionDesc = '高温环境不适合生命存在';
            } else if (relativeDistance < 0.75) {
                zone = '宜居';
                zoneClass = 'zone-habitable';
                waterState = '液态';
                conclusion = '适合生命';
                zoneDesc = '适合生命存在的理想区域';
                waterDesc = '水以液态形式存在，可以形成海洋';
                conclusionDesc = '温度适中，有利于生命繁衍';
            } else {
                zone = '太冷';
                zoneClass = 'zone-cold';
                waterState = '固态';
                conclusion = '不适合';
                zoneDesc = '距离太阳太远，温度过低';
                waterDesc = '水以固态形式存在，形成冰雪';
                conclusionDesc = '低温环境不适合复杂生命存在';
            }
            
            // 更新显示
            const currentZoneEl = document.getElementById('currentZone');
            currentZoneEl.textContent = zone;
            currentZoneEl.className = 'info-value ' + zoneClass;
            
            document.getElementById('zoneDescription').textContent = zoneDesc;
            document.getElementById('currentTemp').textContent = temp + '℃';
            document.getElementById('waterState').textContent = waterState;
            document.getElementById('waterDescription').textContent = waterDesc;
            document.getElementById('conclusion').textContent = conclusion;
            document.getElementById('conclusionDescription').textContent = conclusionDesc;
            
            // 更新温度计
            updateThermometer(temp);
        }

        // 更新温度计
        function updateThermometer(temp) {
            const thermometerFill = document.getElementById('thermometerFill');
            // 温度范围 -200℃ 到 100℃，映射到 0% 到 100%
            const percentage = Math.max(0, Math.min(100, (temp + 200) / 300 * 100));
            thermometerFill.style.height = percentage + '%';
        }

        // 重置地球位置
        function resetEarth() {
            xOffset = 0;
            yOffset = 0;
            earth.style.transform = 'translate(-50%, -50%)';
            updateZoneInfo();
        }

        // 显示帮助
        function showHelp() {
            alert('使用说明：\n\n1. 拖拽地球到不同位置\n2. 观察温度和区域变化\n3. 了解宜居带的科学原理\n\n宜居带是指恒星周围适合生命存在的区域范围。');
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            updateZoneInfo();
            
            // 添加页面加载动画
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '1';
            }, 100);
        });

        // 防止文本选择
        document.addEventListener('selectstart', function(e) {
            if (isDragging) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
