<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宜居带演示器 - 科学版</title>
    
    <!-- CSS文件 -->
    <link rel="stylesheet" href="css/habitable-zone-v2.css">
    
    <!-- 响应式viewport设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- 移动端优化 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>
    <div class="particle-container" id="particleContainer"></div>

    <!-- 头部导航 -->
    <header>
        <a href="index.html" class="back-button">← 返回主页</a>
        <h1>宜居带演示器 - 科学版</h1>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 宜居带区域 -->
        <div class="habitable-zone-section">
            <div class="habitable-zone" id="habitableZone">
                <!-- 区域标签 -->
                <div class="zone-labels">
                    <div class="zone-label hot">过热区</div>
                    <div class="zone-label habitable">宜居带</div>
                    <div class="zone-label cold">寒冷区</div>
                </div>
                
                <!-- 太阳 -->
                <div class="sun"></div>
                
                <!-- 地球 -->
                <div class="earth" id="earth"></div>
                
                <!-- 温度计 -->
                <div class="thermometer">
                    <div class="thermometer-label">温度</div>
                    <div class="thermometer-fill" id="thermometerFill"></div>
                </div>
            </div>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <h2 class="info-title">环境数据</h2>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">当前区域</div>
                    <div class="info-value" id="currentZone">宜居带</div>
                    <div class="info-description" id="zoneDescription">温度适中，液态水存在</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">温度</div>
                    <div class="info-value" id="currentTemp">15°C</div>
                    <div class="info-description">当前模拟温度</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">距离太阳</div>
                    <div class="info-value" id="currentDistance">1.00 AU</div>
                    <div class="info-description">天文单位距离</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">水状态</div>
                    <div class="info-value" id="waterState">液态水</div>
                    <div class="info-description">水以液态形式存在</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">生命适宜性</div>
                    <div class="info-value" id="lifeSuitability">适合生命</div>
                    <div class="info-description" id="lifeDescription">环境适合生命存在</div>
                </div>
            </div>

            <!-- 行星信息 -->
            <div class="planet-info">
                <div class="planet-name" id="planetName">地球</div>
                <div class="planet-description" id="planetInfo">完美的距离，液态水，适宜生命</div>
            </div>

            <!-- 科学数据面板 -->
            <div class="scientific-panel" id="scientificPanel">
                <h3 class="scientific-title">科学数据</h3>
                <div class="scientific-grid">
                    <div class="scientific-item">
                        <div class="scientific-label">太阳辐射</div>
                        <div class="scientific-value" id="solarFlux">1361 W/m²</div>
                    </div>
                    <div class="scientific-item">
                        <div class="scientific-label">反照率</div>
                        <div class="scientific-value" id="albedo">0.306</div>
                    </div>
                    <div class="scientific-item">
                        <div class="scientific-label">温室效应</div>
                        <div class="scientific-value" id="greenhouseEffect">20%</div>
                    </div>
                    <div class="scientific-item">
                        <div class="scientific-label">平衡温度</div>
                        <div class="scientific-value" id="equilibriumTemp">-18°C</div>
                    </div>
                </div>
            </div>

            <!-- 控制按钮 -->
            <div class="controls">
                <button class="control-btn primary" id="resetEarth">
                    🌍 重置到地球
                </button>
                <button class="control-btn" id="showVenus">
                    🌟 跳转到金星
                </button>
                <button class="control-btn" id="showMars">
                    🔴 跳转到火星
                </button>
                <button class="control-btn" id="scientificMode">
                    📊 显示科学模式
                </button>
            </div>
        </div>
    </div>

    <!-- 操作说明 -->
    <div class="instructions">
        🌍 拖拽地球到不同位置，观察温度变化和生命适宜性<br>
        📍 使用按钮快速跳转到其他行星位置<br>
        📊 开启科学模式查看详细的天文数据
    </div>

    <!-- JavaScript文件 -->
    <script src="js/habitable-zone-v2.js"></script>
</body>
</html>
