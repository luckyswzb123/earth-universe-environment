<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系模型 - 地球的宇宙环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 头部导航 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(230, 184, 0, 0.3);
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #e6b800 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .back-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: translateY(-50%) scale(1.05);
        }

        /* 3D画布 */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 控制面板 */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            z-index: 100;
            min-width: 250px;
        }

        .control-item {
            margin-bottom: 15px;
        }

        .control-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #e6b800;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #00c853;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(26px);
        }

        .pause-btn {
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .pause-btn:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: scale(1.05);
        }

        .pause-btn.paused {
            background: #00c853;
            border-color: #00c853;
            color: #ffffff;
        }

        .speed-control {
            width: 100%;
            margin-top: 10px;
        }

        /* 信息卡片 */
        .info-card {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #e6b800;
            border-radius: 15px;
            padding: 25px;
            z-index: 1000;
            display: none;
            max-width: 350px;
            backdrop-filter: blur(10px);
        }

        .info-card.active {
            display: block;
        }

        .info-card h3 {
            color: #e6b800;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .info-card .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .info-card .close-btn:hover {
            transform: scale(1.2);
        }

        .info-card p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .info-card strong {
            color: #e6b800;
        }

        /* 加载提示 */
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2000;
            color: #e6b800;
            font-size: 18px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(230, 184, 0, 0.3);
            border-top: 3px solid #e6b800;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }
            
            .controls {
                bottom: 10px;
                right: 10px;
                padding: 15px;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部导航 -->
    <header>
        <a href="index.html" class="back-button">← 返回主页</a>
        <h1>太阳系模型</h1>
    </header>

    <!-- 3D画布容器 -->
    <div id="canvas-container"></div>

    <!-- 加载提示 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        正在加载3D太阳系...
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
            ⏸️ 暂停运行
        </button>
        <div class="control-item">
            <label>轨道显示</label>
            <div class="toggle-switch active" id="orbitToggle"></div>
        </div>
        <div class="control-item">
            <label>运行速度</label>
            <input type="range" class="speed-control" id="speedControl" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="control-item">
            <label>视角缩放</label>
            <input type="range" class="speed-control" id="zoomControl" min="50" max="200" step="10" value="100">
        </div>
    </div>

    <!-- 行星信息卡片 -->
    <div class="info-card" id="planetInfo">
        <button class="close-btn" onclick="closePlanetInfo()">&times;</button>
        <h3 id="planetName"></h3>
        <div id="planetDetails"></div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 行星数据
        const planetsData = {
            mercury: {
                name: '水星',
                radius: 0.38,
                distance: 10,
                speed: 4.15,
                color: 0x8c8c8c,
                diameter: '4,879 km',
                realDistance: '57.9 百万km',
                temp: '-173~427℃',
                description: '水星是太阳系中最小的行星，也是离太阳最近的行星。',
                fact: '水星的一天（自转周期）相当于地球的59天。'
            },
            venus: {
                name: '金星',
                radius: 0.95,
                distance: 15,
                speed: 1.62,
                color: 0xffd700,
                diameter: '12,104 km',
                realDistance: '108.2 百万km',
                temp: '465℃',
                description: '金星是太阳系中最热的行星，被称为地球的"姊妹星"。',
                fact: '金星的自转方向与其他行星相反，太阳从西边升起。'
            },
            earth: {
                name: '地球',
                radius: 1,
                distance: 20,
                speed: 1,
                color: 0x2196f3,
                diameter: '12,742 km',
                realDistance: '149.6 百万km',
                temp: '-88~58℃',
                description: '地球是目前已知唯一存在生命的行星。',
                fact: '地球表面71%被水覆盖，是太阳系中唯一拥有液态水的行星。'
            },
            mars: {
                name: '火星',
                radius: 0.53,
                distance: 25,
                speed: 0.53,
                color: 0xff5722,
                diameter: '6,779 km',
                realDistance: '227.9 百万km',
                temp: '-87~-5℃',
                description: '火星被称为"红色星球"，因表面富含氧化铁而呈现红色。',
                fact: '火星拥有太阳系中最高的山峰——奥林帕斯山，高度约21公里。'
            },
            jupiter: {
                name: '木星',
                radius: 2.5,
                distance: 40,
                speed: 0.084,
                color: 0xff9800,
                diameter: '139,820 km',
                realDistance: '778.6 百万km',
                temp: '-110℃',
                description: '木星是太阳系中最大的行星，质量是其他所有行星总和的2.5倍。',
                fact: '木星的大红斑是一个已持续数百年的巨大风暴。'
            },
            saturn: {
                name: '土星',
                radius: 2,
                distance: 55,
                speed: 0.034,
                color: 0xfdd835,
                diameter: '116,460 km',
                realDistance: '1,433.5 百万km',
                temp: '-140℃',
                description: '土星以其壮观的环系统而闻名，环主要由冰块和岩石组成。',
                fact: '土星的密度比水还小，如果有足够大的海洋，土星会浮在水面上。'
            },
            uranus: {
                name: '天王星',
                radius: 1.5,
                distance: 70,
                speed: 0.012,
                color: 0x4fc3f7,
                diameter: '50,724 km',
                realDistance: '2,872.5 百万km',
                temp: '-195℃',
                description: '天王星是唯一一个几乎横躺着围绕太阳运转的行星。',
                fact: '天王星拥有淡淡的环系统，而且有27颗已知的卫星。'
            },
            neptune: {
                name: '海王星',
                radius: 1.4,
                distance: 85,
                speed: 0.006,
                color: 0x3f51b5,
                diameter: '49,244 km',
                realDistance: '4,495.1 百万km',
                temp: '-200℃',
                description: '海王星是太阳系中风速最快的行星，风速可达2100公里/小时。',
                fact: '海王星的深蓝色来自大气中的甲烷，它吸收红光并反射蓝光。'
            }
        };

        // 全局变量
        let scene, camera, renderer, raycaster, mouse;
        let planets = [];
        let sun, orbits = [];
        let isPaused = false;
        let speedMultiplier = 1;
        let showOrbits = true;

        // 初始化Three.js场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000814);

            // 创建相机
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 30, 80);
            camera.lookAt(0, 0, 0);

            // 创建渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 创建光源
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 2, 200);
            pointLight.position.set(0, 0, 0);
            pointLight.castShadow = true;
            scene.add(pointLight);

            // 创建太阳
            createSun();

            // 创建行星
            createPlanets();

            // 创建星空背景
            createStarfield();

            // 鼠标交互
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onMouseClick);
            renderer.domElement.addEventListener('mousemove', onMouseMove);

            // 隐藏加载提示
            document.getElementById('loading').style.display = 'none';
        }

        // 创建太阳
        function createSun() {
            const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({ 
                color: 0xffeb3b,
                emissive: 0xffeb3b,
                emissiveIntensity: 1
            });
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            scene.add(sun);

            // 太阳光晕
            const glowGeometry = new THREE.SphereGeometry(3.5, 32, 32);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xff9800,
                transparent: true,
                opacity: 0.3
            });
            const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
            sun.add(sunGlow);
        }

        // 创建行星
        function createPlanets() {
            Object.keys(planetsData).forEach(key => {
                const data = planetsData[key];
                
                // 创建行星网格
                const planetGeometry = new THREE.SphereGeometry(data.radius, 32, 32);
                const planetMaterial = new THREE.MeshPhongMaterial({ 
                    color: data.color,
                    shininess: 10
                });
                const planet = new THREE.Mesh(planetGeometry, planetMaterial);
                planet.position.x = data.distance;
                planet.castShadow = true;
                planet.receiveShadow = true;
                planet.userData = { key: key, data: data };

                // 创建轨道组
                const orbitGroup = new THREE.Group();
                orbitGroup.add(planet);
                scene.add(orbitGroup);

                // 创建轨道线
                const orbitGeometry = new THREE.RingGeometry(data.distance - 0.1, data.distance + 0.1, 64);
                const orbitMaterial = new THREE.MeshBasicMaterial({
                    color: 0x404040,
                    transparent: true,
                    opacity: 0.3,
                    side: THREE.DoubleSide
                });
                const orbit = new THREE.Mesh(orbitGeometry, orbitMaterial);
                orbit.rotation.x = -Math.PI / 2;
                scene.add(orbit);
                orbits.push(orbit);

                // 土星环
                if (key === 'saturn') {
                    const ringGeometry = new THREE.RingGeometry(data.radius * 1.5, data.radius * 2, 32);
                    const ringMaterial = new THREE.MeshBasicMaterial({
                        color: 0xfdd835,
                        transparent: true,
                        opacity: 0.7,
                        side: THREE.DoubleSide
                    });
                    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                    ring.rotation.x = -Math.PI / 2.5;
                    planet.add(ring);
                }

                planets.push({
                    mesh: planet,
                    orbitGroup: orbitGroup,
                    data: data,
                    angle: Math.random() * Math.PI * 2
                });
            });
        }

        // 创建星空背景
        function createStarfield() {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.8
            });

            const starVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = (Math.random() - 0.5) * 2000;
                const y = (Math.random() - 0.5) * 2000;
                const z = (Math.random() - 0.5) * 2000;
                starVertices.push(x, y, z);
            }

            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }

        // 窗口大小调整
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 鼠标点击事件
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

            if (intersects.length > 0) {
                const planet = intersects[0].object;
                showPlanetInfo(planet.userData.key);
            }
        }

        // 鼠标移动事件
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planets.map(p => p.mesh));

            // 更改鼠标样式
            renderer.domElement.style.cursor = intersects.length > 0 ? 'pointer' : 'default';
        }

        // 显示行星信息
        function showPlanetInfo(planetKey) {
            const info = planetsData[planetKey];
            const infoCard = document.getElementById('planetInfo');
            const planetName = document.getElementById('planetName');
            const planetDetails = document.getElementById('planetDetails');
            
            planetName.textContent = info.name;
            planetDetails.innerHTML = `
                <p><strong>直径:</strong> ${info.diameter}</p>
                <p><strong>与太阳距离:</strong> ${info.realDistance}</p>
                <p><strong>表面温度:</strong> ${info.temp}</p>
                <p><strong>描述:</strong> ${info.description}</p>
                <p style="margin-top: 15px; padding: 10px; background: rgba(230, 184, 0, 0.1); border-radius: 5px;">
                    <strong>你知道吗？</strong><br>${info.fact}
                </p>
            `;
            
            infoCard.style.left = '50%';
            infoCard.style.top = '50%';
            infoCard.style.transform = 'translate(-50%, -50%)';
            infoCard.classList.add('active');
        }

        // 关闭行星信息
        function closePlanetInfo() {
            document.getElementById('planetInfo').classList.remove('active');
        }

        // 暂停/继续功能
        function togglePause() {
            isPaused = !isPaused;
            const pauseBtn = document.getElementById('pauseBtn');
            
            if (isPaused) {
                pauseBtn.classList.add('paused');
                pauseBtn.innerHTML = '▶️ 继续运行';
            } else {
                pauseBtn.classList.remove('paused');
                pauseBtn.innerHTML = '⏸️ 暂停运行';
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            // 旋转太阳
            if (sun) {
                sun.rotation.y += 0.005;
            }

            // 行星运动
            if (!isPaused) {
                planets.forEach(planet => {
                    planet.angle += (planet.data.speed * speedMultiplier * 0.01);
                    planet.mesh.position.x = Math.cos(planet.angle) * planet.data.distance;
                    planet.mesh.position.z = Math.sin(planet.angle) * planet.data.distance;
                    planet.mesh.rotation.y += 0.01;
                });
            }

            // 相机围绕太阳旋转
            const time = Date.now() * 0.0001;
            camera.position.x = Math.cos(time) * 80;
            camera.position.z = Math.sin(time) * 80;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        // 轨道显示切换
        document.getElementById('orbitToggle').addEventListener('click', function() {
            this.classList.toggle('active');
            showOrbits = !showOrbits;
            orbits.forEach(orbit => {
                orbit.visible = showOrbits;
            });
        });

        // 速度控制
        document.getElementById('speedControl').addEventListener('input', function() {
            speedMultiplier = parseFloat(this.value);
        });

        // 缩放控制
        document.getElementById('zoomControl').addEventListener('input', function() {
            const zoom = parseFloat(this.value);
            camera.position.setLength(zoom);
        });

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePlanetInfo();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                togglePause();
            }
        });

        // 点击空白处关闭信息卡片
        document.addEventListener('click', function(e) {
            const infoCard = document.getElementById('planetInfo');
            if (!infoCard.contains(e.target) && e.target !== renderer.domElement) {
                closePlanetInfo();
            }
        });

        // 初始化并开始动画
        init();
        animate();
    </script>
</body>
</html>
