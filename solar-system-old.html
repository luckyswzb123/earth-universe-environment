<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太阳系模型 - 地球的宇宙环境</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: radial-gradient(ellipse at center, #0a0a15 0%, #000000 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 星空背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 4s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* 头部导航 */
        header {
            position: relative;
            z-index: 100;
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #e6b800 0%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .back-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: translateY(-50%) scale(1.05);
        }

        /* 太阳系容器 */
        .solar-system-container {
            position: relative;
            width: 100vw;
            height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            z-index: 10;
        }

        .solar-system {
            position: relative;
            width: 800px;
            height: 800px;
            transform-style: preserve-3d;
            transform: rotateX(15deg);
        }

        /* 太阳 */
        .sun {
            position: absolute;
            width: 80px;
            height: 80px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 30%, #fff8e1 0%, #ffeb3b 30%, #ff9800 60%, #ff5722 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px #ff9800,
                0 0 100px #ff5722,
                0 0 150px #ff5722,
                inset 0 0 20px #ff5722;
            animation: sunPulse 4s ease-in-out infinite;
            z-index: 100;
        }

        @keyframes sunPulse {
            0%, 100% { 
                box-shadow: 
                    0 0 60px #ff9800,
                    0 0 100px #ff5722,
                    0 0 150px #ff5722,
                    inset 0 0 20px #ff5722;
            }
            50% { 
                box-shadow: 
                    0 0 80px #ff9800,
                    0 0 120px #ff5722,
                    0 0 180px #ff5722,
                    inset 0 0 30px #ff5722;
            }
        }

        /* 轨道 */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(90deg);
        }

        /* 行星容器 */
        .planet-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            animation: orbit linear infinite;
        }

        /* 行星 */
        .planet {
            position: absolute;
            border-radius: 50%;
            transform-style: preserve-3d;
            cursor: pointer;
            transition: box-shadow 0.2s ease;
            pointer-events: all;
        }

        .planet:hover {
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        .planet:active {
            box-shadow: 0 0 40px rgba(255, 255, 255, 1);
        }

        /* 行星点击区域 */
        .planet-hitbox {
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        /* 暂停状态 */
        .paused .planet-container {
            animation-play-state: paused !important;
        }

        .paused .planet {
            cursor: pointer;
        }

        /* 行星标签 */
        .planet-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            transform: translateZ(30px);
            top: -30px;
            left: 50%;
            transform: translateX(-50%) translateZ(30px);
        }

        .planet:hover .planet-label {
            opacity: 1;
        }

        /* 水星 */
        .mercury-orbit { width: 120px; height: 120px; }
        .mercury-container { animation-duration: 4s; }
        .mercury {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, #b0b0b0 0%, #808080 50%, #606060 100%);
            transform: translateX(60px) translateY(-6px) translateZ(10px);
            box-shadow: 0 0 10px rgba(176, 176, 176, 0.5);
        }

        /* 金星 */
        .venus-orbit { width: 180px; height: 180px; }
        .venus-container { animation-duration: 7s; }
        .venus {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #fff3e0 0%, #ffd700 50%, #ff8f00 100%);
            transform: translateX(90px) translateY(-12px) translateZ(15px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
        }

        /* 地球 */
        .earth-orbit { width: 260px; height: 260px; }
        .earth-container { animation-duration: 10s; }
        .earth {
            width: 26px;
            height: 26px;
            background: radial-gradient(circle at 30% 30%, #64b5f6 0%, #2196f3 50%, #1565c0 100%);
            transform: translateX(130px) translateY(-13px) translateZ(15px);
            box-shadow: 0 0 25px rgba(33, 150, 243, 0.7);
        }

        /* 火星 */
        .mars-orbit { width: 340px; height: 340px; }
        .mars-container { animation-duration: 15s; }
        .mars {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle at 30% 30%, #ff7043 0%, #ff5722 50%, #d84315 100%);
            transform: translateX(170px) translateY(-9px) translateZ(12px);
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }

        /* 木星 */
        .jupiter-orbit { width: 480px; height: 480px; }
        .jupiter-container { animation-duration: 25s; }
        .jupiter {
            width: 56px;
            height: 56px;
            background: radial-gradient(circle at 30% 30%, #ffe0b2 0%, #ffb74d 50%, #f57c00 100%);
            transform: translateX(240px) translateY(-28px) translateZ(25px);
            box-shadow: 0 0 30px rgba(255, 183, 77, 0.5);
        }

        /* 土星 */
        .saturn-orbit { width: 600px; height: 600px; }
        .saturn-container { animation-duration: 35s; }
        .saturn {
            width: 48px;
            height: 48px;
            background: radial-gradient(circle at 30% 30%, #fff9c4 0%, #ffee58 50%, #f9a825 100%);
            transform: translateX(300px) translateY(-24px) translateZ(20px);
            box-shadow: 0 0 25px rgba(255, 238, 88, 0.4);
        }

        /* 土星环 */
        .saturn::after {
            content: '';
            position: absolute;
            width: 80px;
            height: 20px;
            border: 3px solid rgba(255, 238, 88, 0.6);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(70deg);
        }

        /* 天王星 */
        .uranus-orbit { width: 700px; height: 700px; }
        .uranus-container { animation-duration: 45s; }
        .uranus {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle at 30% 30%, #b3e5fc 0%, #4fc3f7 50%, #0288d1 100%);
            transform: translateX(350px) translateY(-16px) translateZ(18px);
            box-shadow: 0 0 20px rgba(79, 195, 247, 0.5);
        }

        /* 海王星 */
        .neptune-orbit { width: 800px; height: 800px; }
        .neptune-container { animation-duration: 60s; }
        .neptune {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle at 30% 30%, #c5cae9 0%, #3f51b5 50%, #1a237e 100%);
            transform: translateX(400px) translateY(-15px) translateZ(18px);
            box-shadow: 0 0 20px rgba(63, 81, 181, 0.5);
        }

        @keyframes orbit {
            from { transform: translate(-50%, -50%) rotateZ(0deg); }
            to { transform: translate(-50%, -50%) rotateZ(360deg); }
        }

        /* 控制面板 */
        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(230, 184, 0, 0.3);
            z-index: 100;
        }

        .pause-btn {
            background: rgba(230, 184, 0, 0.2);
            border: 2px solid #e6b800;
            color: #e6b800;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .pause-btn:hover {
            background: #e6b800;
            color: #0a0a15;
            transform: scale(1.05);
        }

        .pause-btn.paused {
            background: #00c853;
            border-color: #00c853;
            color: #ffffff;
        }

        .control-item {
            margin-bottom: 15px;
        }

        .control-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #e6b800;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: #333;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #00c853;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(26px);
        }

        .speed-control {
            width: 100%;
            margin-top: 10px;
        }

        /* 信息卡片 */
        .info-card {
            position: fixed;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #e6b800;
            border-radius: 15px;
            padding: 25px;
            z-index: 1000;
            display: none;
            max-width: 350px;
            backdrop-filter: blur(10px);
        }

        .info-card.active {
            display: block;
        }

        .info-card h3 {
            color: #e6b800;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .info-card .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #ffffff;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .info-card .close-btn:hover {
            transform: scale(1.2);
        }

        .info-card p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .info-card strong {
            color: #e6b800;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .solar-system {
                width: 90vw;
                height: 90vw;
            }
            
            .controls {
                bottom: 10px;
                right: 10px;
                padding: 15px;
            }
            
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 星空背景 -->
    <div class="stars" id="stars"></div>

    <!-- 头部导航 -->
    <header>
        <a href="index.html" class="back-button">← 返回主页</a>
        <h1>太阳系模型</h1>
    </header>

    <!-- 太阳系 -->
    <div class="solar-system-container">
        <div class="solar-system" id="solarSystem">
            <!-- 太阳 -->
            <div class="sun"></div>
            
            <!-- 水星 -->
            <div class="orbit mercury-orbit"></div>
            <div class="planet-container mercury-container">
                <div class="planet mercury" data-planet="mercury">
                    <div class="planet-hitbox" data-planet="mercury"></div>
                    <span class="planet-label">水星</span>
                </div>
            </div>
            
            <!-- 金星 -->
            <div class="orbit venus-orbit"></div>
            <div class="planet-container venus-container">
                <div class="planet venus" data-planet="venus">
                    <div class="planet-hitbox" data-planet="venus"></div>
                    <span class="planet-label">金星</span>
                </div>
            </div>
            
            <!-- 地球 -->
            <div class="orbit earth-orbit"></div>
            <div class="planet-container earth-container">
                <div class="planet earth" data-planet="earth">
                    <div class="planet-hitbox" data-planet="earth"></div>
                    <span class="planet-label">地球</span>
                </div>
            </div>
            
            <!-- 火星 -->
            <div class="orbit mars-orbit"></div>
            <div class="planet-container mars-container">
                <div class="planet mars" data-planet="mars">
                    <div class="planet-hitbox" data-planet="mars"></div>
                    <span class="planet-label">火星</span>
                </div>
            </div>
            
            <!-- 木星 -->
            <div class="orbit jupiter-orbit"></div>
            <div class="planet-container jupiter-container">
                <div class="planet jupiter" data-planet="jupiter">
                    <div class="planet-hitbox" data-planet="jupiter"></div>
                    <span class="planet-label">木星</span>
                </div>
            </div>
            
            <!-- 土星 -->
            <div class="orbit saturn-orbit"></div>
            <div class="planet-container saturn-container">
                <div class="planet saturn" data-planet="saturn">
                    <div class="planet-hitbox" data-planet="saturn"></div>
                    <span class="planet-label">土星</span>
                </div>
            </div>
            
            <!-- 天王星 -->
            <div class="orbit uranus-orbit"></div>
            <div class="planet-container uranus-container">
                <div class="planet uranus" data-planet="uranus">
                    <div class="planet-hitbox" data-planet="uranus"></div>
                    <span class="planet-label">天王星</span>
                </div>
            </div>
            
            <!-- 海王星 -->
            <div class="orbit neptune-orbit"></div>
            <div class="planet-container neptune-container">
                <div class="planet neptune" data-planet="neptune">
                    <div class="planet-hitbox" data-planet="neptune"></div>
                    <span class="planet-label">海王星</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <button class="pause-btn" id="pauseBtn" onclick="togglePause()">
            ⏸️ 暂停运行
        </button>
        <div class="control-item">
            <label>轨道显示</label>
            <div class="toggle-switch active" id="orbitToggle"></div>
        </div>
        <div class="control-item">
            <label>运行速度</label>
            <input type="range" class="speed-control" id="speedControl" min="0.1" max="3" step="0.1" value="1">
        </div>
        <div class="control-item">
            <label>3D角度</label>
            <input type="range" class="speed-control" id="angleControl" min="0" max="60" step="5" value="15">
        </div>
    </div>

    <!-- 行星信息卡片 -->
    <div class="info-card" id="planetInfo">
        <button class="close-btn" onclick="closePlanetInfo()">&times;</button>
        <h3 id="planetName"></h3>
        <div id="planetDetails"></div>
    </div>

    <script>
        // 行星数据
        const planetsData = {
            mercury: {
                name: '水星',
                diameter: '4,879 km',
                distance: '57.9 百万km',
                temp: '-173~427℃',
                description: '水星是太阳系中最小的行星，也是离太阳最近的行星。',
                fact: '水星的一天（自转周期）相当于地球的59天。'
            },
            venus: {
                name: '金星',
                diameter: '12,104 km',
                distance: '108.2 百万km',
                temp: '465℃',
                description: '金星是太阳系中最热的行星，被称为地球的"姊妹星"。',
                fact: '金星的自转方向与其他行星相反，太阳从西边升起。'
            },
            earth: {
                name: '地球',
                diameter: '12,742 km',
                distance: '149.6 百万km',
                temp: '-88~58℃',
                description: '地球是目前已知唯一存在生命的行星。',
                fact: '地球表面71%被水覆盖，是太阳系中唯一拥有液态水的行星。'
            },
            mars: {
                name: '火星',
                diameter: '6,779 km',
                distance: '227.9 百万km',
                temp: '-87~-5℃',
                description: '火星被称为"红色星球"，因表面富含氧化铁而呈现红色。',
                fact: '火星拥有太阳系中最高的山峰——奥林帕斯山，高度约21公里。'
            },
            jupiter: {
                name: '木星',
                diameter: '139,820 km',
                distance: '778.6 百万km',
                temp: '-110℃',
                description: '木星是太阳系中最大的行星，质量是其他所有行星总和的2.5倍。',
                fact: '木星的大红斑是一个已持续数百年的巨大风暴。'
            },
            saturn: {
                name: '土星',
                diameter: '116,460 km',
                distance: '1,433.5 百万km',
                temp: '-140℃',
                description: '土星以其壮观的环系统而闻名，环主要由冰块和岩石组成。',
                fact: '土星的密度比水还小，如果有足够大的海洋，土星会浮在水面上。'
            },
            uranus: {
                name: '天王星',
                diameter: '50,724 km',
                distance: '2,872.5 百万km',
                temp: '-195℃',
                description: '天王星是唯一一个几乎横躺着围绕太阳运转的行星。',
                fact: '天王星拥有淡淡的环系统，而且有27颗已知的卫星。'
            },
            neptune: {
                name: '海王星',
                diameter: '49,244 km',
                distance: '4,495.1 百万km',
                temp: '-200℃',
                description: '海王星是太阳系中风速最快的行星，风速可达2100公里/小时。',
                fact: '海王星的深蓝色来自大气中的甲烷，它吸收红光并反射蓝光。'
            }
        };

        // 全局变量
        let isPaused = false;
        
        // 生成星空背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numberOfStars = 200;
            
            for (let i = 0; i < numberOfStars; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                star.style.animationDelay = Math.random() * 4 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                starsContainer.appendChild(star);
            }
        }
        
        // 暂停/恢复功能
        function togglePause() {
            const solarSystem = document.getElementById('solarSystem');
            const pauseBtn = document.getElementById('pauseBtn');
            
            isPaused = !isPaused;
            
            if (isPaused) {
                solarSystem.classList.add('paused');
                pauseBtn.classList.add('paused');
                pauseBtn.innerHTML = '▶️ 继续运行';
            } else {
                solarSystem.classList.remove('paused');
                pauseBtn.classList.remove('paused');
                pauseBtn.innerHTML = '⏸️ 暂停运行';
            }
        }

        // 显示行星信息
        function showPlanetInfo(planetKey) {
            const info = planetsData[planetKey];
            const infoCard = document.getElementById('planetInfo');
            const planetName = document.getElementById('planetName');
            const planetDetails = document.getElementById('planetDetails');
            
            planetName.textContent = info.name;
            planetDetails.innerHTML = `
                <p><strong>直径:</strong> ${info.diameter}</p>
                <p><strong>与太阳距离:</strong> ${info.distance}</p>
                <p><strong>表面温度:</strong> ${info.temp}</p>
                <p><strong>描述:</strong> ${info.description}</p>
                <p style="margin-top: 15px; padding: 10px; background: rgba(230, 184, 0, 0.1); border-radius: 5px;">
                    <strong>你知道吗？</strong><br>${info.fact}
                </p>
            `;
            
            infoCard.style.left = '50%';
            infoCard.style.top = '50%';
            infoCard.style.transform = 'translate(-50%, -50%)';
            infoCard.classList.add('active');
        }

        // 关闭行星信息
        function closePlanetInfo() {
            document.getElementById('planetInfo').classList.remove('active');
        }

        // 轨道显示切换
        document.getElementById('orbitToggle').addEventListener('click', function() {
            this.classList.toggle('active');
            const orbits = document.querySelectorAll('.orbit');
            orbits.forEach(orbit => {
                orbit.style.display = this.classList.contains('active') ? 'block' : 'none';
            });
        });

        // 速度控制
        document.getElementById('speedControl').addEventListener('input', function() {
            const speed = this.value;
            const containers = document.querySelectorAll('.planet-container');
            containers.forEach(container => {
                const baseDuration = parseFloat(container.style.animationDuration || 
                    window.getComputedStyle(container).animationDuration);
                container.style.animationDuration = (baseDuration / speed) + 's';
            });
        });

        // 3D角度控制
        document.getElementById('angleControl').addEventListener('input', function() {
            const angle = this.value;
            document.querySelector('.solar-system').style.transform = `rotateX(${angle}deg)`;
        });

        // 初始化行星点击事件 - 使用hitbox
        document.querySelectorAll('.planet-hitbox').forEach(hitbox => {
            hitbox.addEventListener('click', function(e) {
                e.stopPropagation();
                e.preventDefault();
                
                const planetKey = this.dataset.planet;
                showPlanetInfo(planetKey);
            });
            
            // 触摸事件支持
            hitbox.addEventListener('touchend', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                const planetKey = this.dataset.planet;
                showPlanetInfo(planetKey);
            });
            
            // 悬停效果
            hitbox.addEventListener('mouseenter', function() {
                const planet = this.parentElement;
                planet.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.8)';
            });
            
            hitbox.addEventListener('mouseleave', function() {
                const planet = this.parentElement;
                planet.style.boxShadow = '';
            });
        });
        
        // 为行星本身添加悬停效果（但不处理点击）
        document.querySelectorAll('.planet').forEach(planet => {
            planet.addEventListener('mouseenter', function() {
                this.style.boxShadow = '0 0 30px rgba(255, 255, 255, 0.8)';
            });
            
            planet.addEventListener('mouseleave', function() {
                this.style.boxShadow = '';
            });
        });

        // 点击空白处关闭信息卡片
        document.addEventListener('click', function(e) {
            const infoCard = document.getElementById('planetInfo');
            if (!infoCard.contains(e.target) && 
                !e.target.classList.contains('planet') && 
                !e.target.classList.contains('planet-hitbox')) {
                closePlanetInfo();
            }
        });

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closePlanetInfo();
            } else if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
                togglePause();
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
            
            // 添加页面加载动画
            document.body.style.opacity = '0';
            setTimeout(() => {
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
